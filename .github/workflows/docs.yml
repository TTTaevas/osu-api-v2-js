name: Create documentation
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  docs:
    name: Create and publish documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure our git client
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "code@taevas.xyz"
      - name: Install dependencies
        run: npm ci
      - name: Generate documentation through the command defined in package.json
        run: npm run docs
      - name: Move the docs up and get rid of the rest (this preserves files that start with a dot)
        run: |
          mv docs/ ..
          rm -rf *
          mv ../docs/* .
      - name: Add a .domains file just in case
        run: cp CNAME .domains
      - name: Remove the "pages" branch currently online
        run: |
          if [[ -n $(git ls-remote --heads origin refs/heads/pages) ]]; then
            git push origin --delete pages
          else
            echo "No pages branch online to remove!"
          fi
      - name: Create a new "pages" branch
        run: git switch -C pages
      - name: Add and commit the changes
        run: |
          git add .
          git commit -m "Automatically generated documentation"
      - name: Send the changes to GitHub, let GitHub Pages do its magic
        run: git push --set-upstream origin pages
